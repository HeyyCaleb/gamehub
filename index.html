<!DOCTYPE html>
<html>
<head>
    <title>Game Hub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }
        header {
            background: #1e293b;
            padding: 15px;
            text-align: center;
        }
        input {
            width: 60%;
            padding: 10px;
            margin-top: 10px;
        }
        .games {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game {
            background: #1e293b;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 500px;
            border: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>🎮 Game Hub</h1>
    <input id="search" placeholder="Search games..." onkeyup="searchGames()">
</header>

<div class="games" id="games"></div>

<iframe id="player"></iframe>

<script>
const games = [
    { name: "2048", url: "https://play2048.co/" },
    { name: "Snake", url: "https://playsnake.org/" },
    { name: "Tetris", url: "https://tetris.com/play-tetris" },
    { name: "Pacman", url: "https://www.google.com/logos/2010/pacman10-i.html" }
];

function displayGames(list) {
    const container = document.getElementById("games");
    container.innerHTML = "";
    list.forEach(game => {
        container.innerHTML += `
            <div class="game">
                <h3>${game.name}</h3>
                <button onclick="playGame('${game.url}')">Play</button>
            </div>
        `;
    });
}

function searchGames() {
    const value = document.getElementById("search").value.toLowerCase();
    const filtered = games.filter(g => g.name.toLowerCase().includes(value));
    displayGames(filtered);
}

function playGame(url) {
    document.getElementById("player").src = url;
}

displayGames(games);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #020617;
    height: 100vh;
    padding: 20px;
    box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #1e293b;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover {
    background: #3b82f6;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Top bar */
.topbar {
    display: flex;
    justify-content: center;
}

.search {
    width: 60%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
}

/* Game grid */
.games {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

/* Game cards */
.game {
    background: #1e293b;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
    transform: scale(1);
}

.game:hover {
    transform: scale(1.05);
    background: #334155;
}

.game button {
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

/* Player */
iframe {
    width: 100%;
    height: 400px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    animation: fadeIn 0.5s ease;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>🎮 GameHub</h2>
    <button onclick="showAll()">Home</button>
    <button onclick="filterCategory('arcade')">Arcade</button>
    <button onclick="filterCategory('puzzle')">Puzzle</button>
</div>

<div class="main">

    <div class="topbar">
        <input class="search" id="search" placeholder="🔍 Search games..." onkeyup="searchGames()">
    </div>

    <div class="games" id="games"></div>

    <iframe id="player"></iframe>

</div>

<script>
const games = [
    { name: "2048", category: "puzzle", url: "https://play2048.co/" },
    { name: "Snake", category: "arcade", url: "https://playsnake.org/" },
    { name: "Tetris", category: "puzzle", url: "https://tetris.com/play-tetris" },
    { name: "Pacman", category: "arcade", url: "https://www.google.com/logos/2010/pacman10-i.html" }
];

let currentGames = [...games];

function displayGames(list) {
    const container = document.getElementById("games");
    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = "<p>No results found</p>";
        return;
    }

    list.forEach(game => {
        container.innerHTML += `
            <div class="game">
                <h3>${game.name}</h3>
                <button onclick="playGame('${game.url}')">Play</button>
            </div>
        `;
    });
}

function searchGames() {
    const value = document.getElementById("search").value.toLowerCase();
    currentGames = games.filter(g => g.name.toLowerCase().includes(value));
    displayGames(currentGames);
}

function filterCategory(cat) {
    currentGames = games.filter(g => g.category === cat);
    displayGames(currentGames);
}

function showAll() {
    currentGames = games;
    displayGames(games);
}

function playGame(url) {
    document.getElementById("player").src = url;
}

// Enter key = play first result
document.getElementById("search").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && currentGames.length > 0) {
        playGame(currentGames[0].url);
    }
});

displayGames(games);
</script>

</body>
</html>
